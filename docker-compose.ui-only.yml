# Run web UI in Docker while GoClaw backend runs natively on host
#
# Usage:
#   docker compose -f docker-compose.ui-only.yml up -d --build
#
# Access dashboard at: http://localhost:3000
#
# IMPORTANT: Your native GoClaw backend must be running on the host

services:
  goclaw-ui:
    build:
      context: ./ui/web
      dockerfile: Dockerfile
    ports:
      - "${GOCLAW_UI_PORT:-3000}:80"
    volumes:
      # Mount custom nginx config that points to host machine
      - ./ui/web/nginx.host.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    extra_hosts:
      # Allow container to reach host machine
      - "host.docker.internal:host-gateway"
